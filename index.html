<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ECOBUS V6 Smart Transport</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

:root{
--eco-blue:#0A4FB4;
--eco-light:#1EA7FF;
--eco-red:#C0392B;
--eco-bg:#F4F7FB;
}

body{
margin:0;
font-family:Arial;
background:var(--eco-bg);
}

/* HEADER */

header{
background:linear-gradient(90deg,var(--eco-blue),var(--eco-light));
color:white;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:8px 12px;
border:none;
background:var(--eco-blue);
color:white;
cursor:pointer;
border-radius:4px;
}

.logout{
background:var(--eco-red);
}

/* LOGIN */

.login{
max-width:340px;
margin:120px auto;
background:white;
padding:30px;
border-radius:8px;
}

/* LAYOUT */

.layout{
display:flex;
min-height:100vh;
}

.sidebar{
width:220px;
background:#16202a;
padding:15px;
}

.sidebar button{
width:100%;
margin:5px 0;
}

.content{
flex:1;
padding:20px;
}

/* CARDS */

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:15px;
}

/* GRID */

.analytics{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.box{
background:var(--eco-blue);
color:white;
padding:20px;
border-radius:8px;
}

/* BUS SEATS 2+2 */

.bus{
display:grid;
grid-template-columns:repeat(5,60px);
gap:8px;
max-width:340px;
}

.seat{
height:50px;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
color:white;
cursor:pointer;
}

.aisle{
background:transparent;
}

.free{background:#2ecc71}
.booked{background:#e74c3c}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

/* MAP */

#map{
height:400px;
border-radius:8px;
}

/* MOBILE */

@media(max-width:900px){

.layout{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
flex-wrap:wrap;
}

.sidebar button{
flex:1 1 120px;
}

}

</style>
</head>

<body>

<header>
<span>🚍 ECOBUS V6</span>
<div>
<span id="userInfo"></span>
<button class="logout" onclick="logout()">Logout</button>
</div>
</header>

<div id="loginScreen" class="login">

<h3>Login</h3>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>
admin/admin123<br>
staff/staff123<br>
driver/driver123<br>
customer/customer123
</p>

</div>

<div id="app" style="display:none">

<div class="layout">

<div class="sidebar">

<button onclick="page('dashboard')">Dashboard</button>
<button onclick="page('fleet')">Fleet</button>
<button onclick="page('routes')">Routes</button>
<button onclick="page('trips')">Trips</button>
<button onclick="page('mapPage')">Live Map</button>
<button onclick="page('manifest')">Manifest</button>
<button onclick="page('driver')">Driver</button>
<button onclick="page('booking')">Booking</button>

</div>

<div class="content">

<!-- DASHBOARD -->

<div id="dashboard">

<div class="analytics">

<div class="box">Routes <h2 id="routesCount"></h2></div>
<div class="box">Trips <h2 id="tripsCount"></h2></div>
<div class="box">Tickets <h2 id="ticketsCount"></h2></div>

</div>

</div>

<!-- FLEET -->

<div id="fleet" style="display:none">

<div class="card">

<h3>Add Bus</h3>

<input id="busNumber" placeholder="Bus Number">
<input id="driverName" placeholder="Driver">

<button onclick="addBus()">Add</button>

</div>

<table>

<thead>
<tr>
<th>Bus</th>
<th>Driver</th>
</tr>
</thead>

<tbody id="busList"></tbody>

</table>

</div>

<!-- ROUTES -->

<div id="routes" style="display:none">

<div class="card">

<input id="from" placeholder="From">
<input id="to" placeholder="To">
<input id="price" placeholder="Price">

<button onclick="addRoute()">Create Route</button>

</div>

<table>
<thead>
<tr>
<th>From</th>
<th>To</th>
<th>Price</th>
</tr>
</thead>
<tbody id="routeList"></tbody>
</table>

</div>

<!-- TRIPS -->

<div id="trips" style="display:none">

<div class="card">

<select id="routeSelect"></select>
<input id="time" placeholder="Departure Time">

<button onclick="addTrip()">Create Trip</button>

</div>

<table>

<thead>
<tr>
<th>Route</th>
<th>Time</th>
</tr>
</thead>

<tbody id="tripList"></tbody>

</table>

</div>

<!-- MAP -->

<div id="mapPage" style="display:none">

<div class="card">

<h3>Live Bus Tracking</h3>

<div id="map"></div>

</div>

</div>

<!-- MANIFEST -->

<div id="manifest" style="display:none">

<h3>Passenger Manifest</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Seat</th>
</tr>
</thead>

<tbody id="manifestList"></tbody>

</table>

</div>

<!-- DRIVER DASHBOARD -->

<div id="driver" style="display:none">

<div class="card">

<h3>Driver Mobile Dashboard</h3>

<p>Trip Status: On Route</p>
<p>Passengers: <span id="driverPassengers"></span></p>

<button onclick="startTrip()">Start Trip</button>

</div>

</div>

<!-- BOOKING -->

<div id="booking" style="display:none">

<h3>Seat Booking</h3>

<select id="tripBooking"></select>

<input id="passenger" placeholder="Passenger Name">

<div id="seats" class="bus"></div>

</div>

</div>

</div>

</div>

<script>

const users=[
{username:"admin",password:"admin123",role:"admin"},
{username:"staff",password:"staff123",role:"staff"},
{username:"driver",password:"driver123",role:"driver"},
{username:"customer",password:"customer123",role:"customer"}
]

function db(k){return JSON.parse(localStorage.getItem(k)||"[]")}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}

function login(){

let u=username.value
let p=password.value

let f=users.find(x=>x.username==u && x.password==p)

if(!f)return alert("Invalid login")

loginScreen.style.display="none"
app.style.display="block"

userInfo.innerText=f.username

render()

}

function logout(){
location.reload()
}

function page(id){

document.querySelectorAll(".content>div")
.forEach(d=>d.style.display="none")

document.getElementById(id).style.display="block"

}

/* DATA */

function addBus(){

let b=db("buses")

b.push({
number:busNumber.value,
driver:driverName.value
})

save("buses",b)

render()

}

function addRoute(){

let r=db("routes")

r.push({
from:from.value,
to:to.value,
price:price.value
})

save("routes",r)

render()

}

function addTrip(){

let t=db("trips")

t.push({
route:routeSelect.value,
time:time.value
})

save("trips",t)

render()

}

/* RENDER */

function render(){

let buses=db("buses")
let routes=db("routes")
let trips=db("trips")
let tickets=db("tickets")

routesCount.innerText=routes.length
tripsCount.innerText=trips.length
ticketsCount.innerText=tickets.length

busList.innerHTML=""

buses.forEach(b=>{
busList.innerHTML+=`<tr><td>${b.number}</td><td>${b.driver}</td></tr>`
})

routeList.innerHTML=""
routeSelect.innerHTML=""

routes.forEach((r,i)=>{

routeList.innerHTML+=`
<tr>
<td>${r.from}</td>
<td>${r.to}</td>
<td>${r.price}</td>
</tr>
`

routeSelect.innerHTML+=`
<option value="${i}">
${r.from} → ${r.to}
</option>
`

})

tripList.innerHTML=""
tripBooking.innerHTML=""

trips.forEach((t,i)=>{

let r=routes[t.route]

tripList.innerHTML+=`
<tr>
<td>${r.from}→${r.to}</td>
<td>${t.time}</td>
</tr>
`

tripBooking.innerHTML+=`
<option value="${i}">
${r.from}→${r.to} ${t.time}
</option>
`

})

drawSeats()

}

/* BUS SEATS */

function drawSeats(){

let trip=tripBooking.value

let seats=document.getElementById("seats")

let tickets=db("tickets")

seats.innerHTML=""

for(let i=1;i<=52;i++){

if(i%5==3){

seats.innerHTML+=`<div class="aisle"></div>`

continue

}

let booked=tickets.find(t=>t.trip==trip && t.seat==i)

seats.innerHTML+=`
<div class="seat ${booked?"booked":"free"}"
onclick="bookSeat(${i})">${i}</div>
`

}

}

function bookSeat(n){

let name=passenger.value
let trip=tripBooking.value

let tickets=db("tickets")

tickets.push({
name:name,
trip:trip,
seat:n,
id:"ECO"+Date.now()
})

save("tickets",tickets)

generateQR("ECO"+Date.now())

render()

}

/* MAP */

let map=L.map('map').setView([1.29,32.29],6)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

let bus=L.marker([0.3476,32.5825]).addTo(map)

setInterval(()=>{

let lat=bus.getLatLng().lat+0.05*(Math.random()-0.5)
let lng=bus.getLatLng().lng+0.05*(Math.random()-0.5)

bus.setLatLng([lat,lng])

},3000)

render()

</script>

</body>
</html>
