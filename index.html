<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ECOBUS Smart System V6</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="manifest" href="data:application/json,{
'name':'ECOBUS',
'short_name':'ECOBUS',
'display':'standalone',
'start_url':'./',
'background_color':'#ffffff',
'theme_color':'#2e7d32'
}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#2e7d32;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
}

.sidebar{
width:220px;
background:#1b5e20;
height:100vh;
position:fixed;
padding-top:20px;
}

.sidebar button{
display:block;
width:100%;
border:none;
padding:12px;
background:none;
color:white;
text-align:left;
}

.main{
margin-left:220px;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:10px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
background:#ff9800;
border:none;
padding:8px 12px;
border-radius:5px;
color:white;
}

.bus{
display:grid;
grid-template-columns:repeat(4,40px);
gap:6px;
}

.seat{
width:40px;
height:40px;
background:#ccc;
border-radius:5px;
text-align:center;
line-height:40px;
cursor:pointer;
}

.seat.booked{
background:#d32f2f;
color:white;
}

.seat.selected{
background:#2e7d32;
color:white;
}

.map{
height:400px;
background:#e0e0e0;
position:relative;
}

.busDot{
width:12px;
height:12px;
background:red;
border-radius:50%;
position:absolute;
}

@media(max-width:900px){

.sidebar{
width:100%;
height:auto;
position:relative;
display:flex;
flex-wrap:wrap;
}

.main{
margin-left:0;
}

}

</style>
</head>

<body>

<div id="login" class="card" style="max-width:350px;margin:80px auto">

<h2>ECOBUS Login</h2>

<input id="user" placeholder="username"><br><br>
<input id="pass" type="password" placeholder="password"><br><br>

<button onclick="login()">Login</button>

<p>
admin / admin123<br>
staff / staff123<br>
customer / customer123<br>
driver / driver123
</p>

</div>

<div id="app" style="display:none">

<header>
<div>🚍 ECOBUS V6</div>
<div id="userInfo"></div>
</header>

<div class="sidebar">

<button onclick="page('dashboard')">Dashboard</button>
<button onclick="page('routes')">Routes</button>
<button onclick="page('trips')">Trips</button>
<button onclick="page('booking')">Booking</button>
<button onclick="page('manifest')">Passenger Manifest</button>
<button onclick="page('driver')">Driver App</button>
<button onclick="page('map')">Live Map</button>

</div>

<div class="main">

<div id="dashboard" class="card">

<h3>Analytics</h3>

<canvas id="chart"></canvas>

</div>

<div id="routes" class="card" style="display:none">

<h3>Routes</h3>

<ul id="routeList"></ul>

<button onclick="addRoute()">Add Route</button>

</div>

<div id="trips" class="card" style="display:none">

<h3>Trips</h3>

<ul id="tripList"></ul>

<button onclick="addTrip()">Add Trip</button>

</div>

<div id="booking" class="card" style="display:none">

<h3>Seat Booking</h3>

<div class="bus" id="bus"></div>

<br>

Passenger Name:
<input id="pname">

<button onclick="book()">Book Seat</button>

</div>

<div id="manifest" class="card" style="display:none">

<h3>Passenger Manifest</h3>

<ul id="manifestList"></ul>

</div>

<div id="driver" class="card" style="display:none">

<h3>Driver Mobile Dashboard</h3>

Trip: Juba → Kampala<br><br>

<button onclick="depart()">Start Trip</button>
<button onclick="arrive()">Arrived</button>

</div>

<div id="map" class="card" style="display:none">

<h3>Live Bus Map</h3>

<div class="map" id="mapArea">

<div class="busDot" id="bus1"></div>

</div>

</div>

</div>
</div>

<script>

const users=[
{username:"admin",password:"admin123",role:"admin",name:"Admin"},
{username:"staff",password:"staff123",role:"staff",name:"Ticket Staff"},
{username:"customer",password:"customer123",role:"customer",name:"Passenger"},
{username:"driver",password:"driver123",role:"driver",name:"Driver"}
]

let seats=JSON.parse(localStorage.getItem("seats")||"[]")

function login(){

const u=user.value
const p=pass.value

const found=users.find(x=>x.username==u && x.password==p)

if(!found){alert("Invalid login");return}

login.style.display="none"
app.style.display="block"

userInfo.innerText=found.name+" ("+found.role+")"

initSeats()
chart()

}

function page(p){

["dashboard","routes","trips","booking","manifest","driver","map"].forEach(x=>{
document.getElementById(x).style.display="none"
})

document.getElementById(p).style.display="block"

if(p=="manifest")loadManifest()

}

function initSeats(){

bus.innerHTML=""

for(let i=1;i<=52;i++){

let s=document.createElement("div")

s.className="seat"

s.innerText=i

if(seats.includes(i))s.classList.add("booked")

s.onclick=()=>selectSeat(i,s)

bus.appendChild(s)

}

}

let selected=null

function selectSeat(i,el){

if(seats.includes(i))return

selected=i

document.querySelectorAll(".seat").forEach(x=>x.classList.remove("selected"))

el.classList.add("selected")

}

function book(){

if(!selected)return alert("Select seat")

seats.push(selected)

localStorage.setItem("seats",JSON.stringify(seats))

createTicket()

initSeats()

}

function createTicket(){

let canvas=document.createElement("canvas")

QRCode.toCanvas(canvas,"ECOBUS-TICKET-"+selected)

let img=canvas.toDataURL()

const {jsPDF}=window.jspdf

let pdf=new jsPDF()

pdf.text("ECOBUS Ticket",20,20)

pdf.text("Seat: "+selected,20,40)

pdf.addImage(img,'PNG',20,60,50,50)

pdf.save("ticket-seat-"+selected+".pdf")

}

function chart(){

new Chart(chart,{
type:'bar',
data:{
labels:["Seats Sold","Seats Left"],
datasets:[{
data:[seats.length,52-seats.length]
}]
}
})

}

function loadManifest(){

manifestList.innerHTML=""

seats.forEach(s=>{
let li=document.createElement("li")
li.innerText="Passenger Seat "+s
manifestList.appendChild(li)
})

}

function addRoute(){

let r=prompt("Route")

let li=document.createElement("li")
li.innerText=r

routeList.appendChild(li)

}

function addTrip(){

let t=prompt("Trip")

let li=document.createElement("li")
li.innerText=t

tripList.appendChild(li)

}

function depart(){
alert("Trip Started")
}

function arrive(){
alert("Trip Completed")
}

let pos=0

setInterval(()=>{

pos+=2
bus1.style.left=pos+"px"
bus1.style.top=(pos/2)+"px"

if(pos>350)pos=0

},1000)

if('serviceWorker' in navigator){

navigator.serviceWorker.register(
URL.createObjectURL(
new Blob([`

self.addEventListener('install',e=>self.skipWaiting())

self.addEventListener('fetch',e=>{})

`],{type:'text/javascript'})
))

}

</script>

</body>
</html>
